<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cebuano Vocabulary</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
            min-height: 100vh; 
            padding: 1.5rem; 
            color: #fff;
            transition: background 0.3s ease, color 0.3s ease;
        }
        
        body.light-theme {
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            color: #333;
        }
        .container { max-width: 700px; margin: 0 auto; }
        
        .header { 
            margin-bottom: 2rem; 
            text-align: center;
            scroll-margin-top: 100px;
        }
        .header h1 { 
            font-size: 2.5rem; 
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #FF6B9D 0%, #FFC75F 50%, #845EC2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p { 
            font-size: 0.95rem; 
            color: #aaa; 
            font-family: 'Inter', sans-serif;
        }
        
        /* Theme Toggle Button */
        .theme-toggle {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.1);
        }

        body.light-theme .theme-toggle {
            background: rgba(0, 0, 0, 0.1);
            border-color: rgba(0, 0, 0, 0.2);
            color: #333;
        }

        body.light-theme .theme-toggle:hover {
            background: rgba(0, 0, 0, 0.2);
            border-color: rgba(0, 0, 0, 0.4);
        }

        /* Light theme adjustments */
        body.light-theme .header p { 
            color: #555; 
        }

        body.light-theme .toggle-container {
            background: rgba(0, 0, 0, 0.05);
            border: 2px solid rgba(0, 0, 0, 0.1);
        }

        body.light-theme .toggle-label {
            color: #333;
        }

        body.light-theme .slider {
            background-color: rgba(0, 0, 0, 0.1);
            border: 2px solid rgba(0, 0, 0, 0.2);
        }

        body.light-theme .toggle-text {
            color: #333;
        }

        body.light-theme .nav-menu {
            background: rgba(0, 0, 0, 0.05);
            border: 2px solid rgba(0, 0, 0, 0.1);
        }

        body.light-theme .nav-btn {
            background: rgba(0, 0, 0, 0.08);
            color: #333;
            border: 2px solid rgba(0, 0, 0, 0.15);
        }

        body.light-theme .nav-btn:hover {
            background: rgba(0, 0, 0, 0.12);
            border-color: rgba(0, 0, 0, 0.3);
        }

        body.light-theme .nav-btn.active {
            background: linear-gradient(135deg, #FF6B9D 0%, #FF8066 100%);
            color: white;
        }

        body.light-theme .category-section { 
            background: rgba(0, 0, 0, 0.05);
            border: 2px solid rgba(0, 0, 0, 0.1);
        }

        body.light-theme .category-section:hover {
            background: rgba(0, 0, 0, 0.08);
            border-color: rgba(0, 0, 0, 0.15);
        }

        body.light-theme .category-title { 
            color: #333;
        }

        body.light-theme .word-card { 
            background: rgba(0, 0, 0, 0.05);
            border: 2px solid rgba(0, 0, 0, 0.1);
            color: #333;
        }

        body.light-theme .word-card:hover:not(.flipped) { 
            background: rgba(0, 0, 0, 0.08);
            border-color: rgba(0, 0, 0, 0.2);
        }

        body.light-theme .section-btn {
            background: rgba(0, 0, 0, 0.1);
            color: #333;
            border: 2px solid rgba(0, 0, 0, 0.2);
        }

        /* Toggle Container */
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
        }

        .toggle-label {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 70px;
            height: 34px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.2);
            transition: 0.3s;
            border-radius: 34px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #FF6B9D;
            border-color: #FF8066;
        }

        input:checked + .slider:before {
            transform: translateX(36px);
        }

        .toggle-text {
            font-size: 0.85rem;
            font-weight: 600;
            min-width: 120px;
            text-align: center;
        }

        /* Navigation Grid */
        .nav-menu {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2.5rem;
            padding: 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }
        
        .nav-btn {
            padding: 1rem;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.75rem;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            min-height: 110px;
        }
        
        .nav-icon {
            font-size: 2rem;
            line-height: 1;
        }
        
        .nav-label {
            text-align: center;
            line-height: 1.2;
        }
        
        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-4px);
        }
        
        .nav-btn.active {
            background: linear-gradient(135deg, #FF6B9D 0%, #FF8066 100%);
            border-color: transparent;
            box-shadow: 0 6px 16px rgba(255, 107, 157, 0.3);
        }

        .controls {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
            gap: 1rem;
        }
        .reset-button { 
            padding: 0.8rem 2rem; 
            background: linear-gradient(135deg, #FF6B9D 0%, #FF8066 100%);
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 600;
            font-size: 0.95rem;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(255, 107, 157, 0.3);
        }
        .reset-button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(255, 107, 157, 0.4);
        }

        /* Category Section Boxes */
        .category-section { 
            margin-bottom: 2.5rem;
            padding: 1.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            transition: all 0.3s ease;
            scroll-margin-top: 100px;
        }
        
        .category-section:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            gap: 1rem;
        }

        .category-title { 
            font-size: 1.3rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            color: #fff;
            flex: 1;
        }

        .section-controls {
            display: flex;
            gap: 0.6rem;
        }

        .section-btn {
            padding: 0.5rem 0.8rem;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.1rem;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 40px;
            height: 40px;
        }

        .section-btn:hover {
            background: linear-gradient(135deg, #FF6B9D 0%, #FF8066 100%);
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 107, 157, 0.3);
        }

        .words-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 1rem;
        }

        .word-card { 
            padding: 1.2rem 1rem; 
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; 
            cursor: pointer; 
            font-size: 0.95rem; 
            font-weight: 600;
            min-height: 110px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            color: #fff;
        }

        .word-card:hover:not(.flipped) { 
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .word-card.flipped { 
            color: white;
            border: none;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4);
            transform: scale(1.02);
        }
        
        /* Gradient backgrounds for flipped cards */
        .word-card.flipped.grad-1 { background: linear-gradient(135deg, #FF6B9D 0%, #FF8066 100%); }
        .word-card.flipped.grad-2 { background: linear-gradient(135deg, #FFC75F 0%, #FFD464 100%); }
        .word-card.flipped.grad-3 { background: linear-gradient(135deg, #845EC2 0%, #B39DDB 100%); }
        .word-card.flipped.grad-4 { background: linear-gradient(135deg, #00D2FC 0%, #3A86FF 100%); }
        .word-card.flipped.grad-5 { background: linear-gradient(135deg, #29FFC6 0%, #20C997 100%); }
        .word-card.flipped.grad-6 { background: linear-gradient(135deg, #FF9671 0%, #FFC75F 100%); }
        .word-card.flipped.grad-7 { background: linear-gradient(135deg, #F15BB5 0%, #FF6B9D 100%); }
        .word-card.flipped.grad-8 { background: linear-gradient(135deg, #00BCD4 0%, #4DD0E1 100%); }
        .word-card.flipped.grad-9 { background: linear-gradient(135deg, #7C3AED 0%, #A78BFA 100%); }
        .word-card.flipped.grad-10 { background: linear-gradient(135deg, #10B981 0%, #34D399 100%); }
        .word-card.flipped.grad-11 { background: linear-gradient(135deg, #EC4899 0%, #F472B6 100%); }
        .word-card.flipped.grad-12 { background: linear-gradient(135deg, #F59E0B 0%, #FBBF24 100%); }

        @media (max-width: 600px) { 
            .header h1 { font-size: 2rem; }
            .toggle-container { flex-direction: column; gap: 0.8rem; }
            .nav-menu { grid-template-columns: repeat(2, 1fr); gap: 0.8rem; padding: 0.8rem; }
            .nav-btn { padding: 0.8rem; min-height: 95px; font-size: 0.7rem; gap: 0.5rem; }
            .nav-icon { font-size: 1.5rem; }
            .category-section { padding: 1.2rem; }
            .category-header { flex-direction: column; align-items: flex-start; }
            .words-grid { gap: 0.75rem; }
            .word-card { 
                padding: 1rem 0.75rem; 
                font-size: 0.85rem; 
                min-height: 95px;
            }
            .reset-button { padding: 0.7rem 1.5rem; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Theme Toggle Button -->
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark theme">🌙</button>

        <div class="header" id="header">
            <h1>Cebuano Vocabulary</h1>
            <p style="font-size: 0.9rem; color: #888; margin-top: 0.3rem; margin-bottom: 1rem;">by Tristan Gallagher</p>
            <p>Learn essential Cebuano words</p>
        </div>

        <!-- Toggle Switch -->
        <div class="toggle-container">
            <span class="toggle-label">Learning Mode:</span>
            <label class="toggle-switch">
                <input type="checkbox" id="languageToggle" onchange="toggleLanguageMode()">
                <span class="slider"></span>
            </label>
            <span class="toggle-text" id="toggleText">ENGLISH → CEBUANO</span>
        </div>

        <div class="nav-menu" id="navMenu"></div>

        <div class="controls">
            <button class="reset-button" onclick="resetAll()">↻ Master Reset</button>
        </div>

        <div id="categories"></div>
    </div>

    <script>
        const gradients = ['grad-1', 'grad-2', 'grad-3', 'grad-4', 'grad-5', 'grad-6', 'grad-7', 'grad-8', 'grad-9', 'grad-10', 'grad-11', 'grad-12'];
        
        let languageMode = 'en'; // 'en' = English first, 'ce' = Cebuano first
        let isDarkTheme = true;

        function toggleTheme() {
            isDarkTheme = !isDarkTheme;
            const body = document.body;
            const button = document.querySelector('.theme-toggle');
            
            if (isDarkTheme) {
                body.classList.remove('light-theme');
                button.textContent = '🌙';
                button.title = 'Switch to light theme';
            } else {
                body.classList.add('light-theme');
                button.textContent = '☀️';
                button.title = 'Switch to dark theme';
            }
            
            localStorage.setItem('theme', isDarkTheme ? 'dark' : 'light');
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            const button = document.querySelector('.theme-toggle');
            
            if (savedTheme === 'light') {
                isDarkTheme = false;
                document.body.classList.add('light-theme');
                button.textContent = '☀️';
                button.title = 'Switch to dark theme';
            } else {
                isDarkTheme = true;
                button.textContent = '🌙';
                button.title = 'Switch to light theme';
            }
        }
        
        const data = {
            categories: [
                {id: 'greetings', name: 'Greetings & Manners', icon: '👋', gradIdx: 0, words: [
                    {e: 'Hello', c: 'Kumusta'}, {e: 'How are you?', c: 'Kumusta ka'}, {e: 'Good Morning', c: 'Maayong Buntag'}, {e: 'Good Afternoon', c: 'Maayong Hapon'}, {e: 'Good Night', c: 'Maayong Gabii'}, {e: 'Thank you', c: 'salamat'}, {e: 'Please', c: 'palihog'}, {e: 'Yes', c: 'Oo'}, {e: 'No', c: 'Dili'}, {e: 'Yes Please', c: 'Oo Palihug'}, {e: 'No Thank You', c: 'Dili Salamat'}, {e: 'I want', c: 'Gusto Ko'}
                ]},
                {id: 'sentences', name: 'Feelings & Romance', icon: '💕', gradIdx: 1, words: [
                    {e: 'I Love you', c: 'Gihigugma ko ikaw'}, {e: 'My Love', c: 'palangga ko'}, {e: 'Very Cute', c: 'Cute Kaayo'}, {e: 'Very Tasty', c: 'Lami Kaayo'}, {e: 'I want you to hug me', c: 'Gusto ko mo gakos nimo'}, {e: 'Handsome', c: 'Gwapo'}, {e: 'Beautiful', c: 'Gwapa'}
                ]},
                {id: 'numbers', name: 'Numbers', icon: '🔢', gradIdx: 2, words: [
                    {e: 'One', c: 'usa'}, {e: 'Two', c: 'duha'}, {e: 'Three', c: 'tulo'}, {e: 'Four', c: 'upat'}, {e: 'Five', c: 'lima'}, {e: 'Six', c: 'unom'}, {e: 'Seven', c: 'pito'}, {e: 'Eight', c: 'walo'}, {e: 'Nine', c: 'siyam'}, {e: 'Ten', c: 'napulo'}, {e: 'Eleven', c: 'napulo-og-usa'}
                ]},
                {id: 'days', name: 'Days of the Week', icon: '📅', gradIdx: 3, words: [
                    {e: 'Monday', c: 'lunes'}, {e: 'Tuesday', c: 'martes'}, {e: 'Wednesday', c: 'miyerkules'}, {e: 'Thursday', c: 'huwebes'}, {e: 'Friday', c: 'biyernes'}, {e: 'Saturday', c: 'sabado'}, {e: 'Sunday', c: 'domingo'}
                ]},
                {id: 'months', name: 'Months', icon: '🗓️', gradIdx: 4, words: [
                    {e: 'January', c: 'Enero'}, {e: 'February', c: 'Pebrero'}, {e: 'March', c: 'Marso'}, {e: 'April', c: 'Abril'}, {e: 'May', c: 'Mayo'}, {e: 'June', c: 'Hunyo'}, {e: 'July', c: 'Hulyo'}, {e: 'August', c: 'Agosto'}, {e: 'September', c: 'Septyembre'}, {e: 'October', c: 'Oktubre'}, {e: 'November', c: 'Nobyembre'}, {e: 'December', c: 'Disyembre'}
                ]},
                {id: 'food', name: 'Food & Drinks', icon: '🍽️', gradIdx: 5, words: [
                    {e: 'Water', c: 'Tubig'}, {e: 'Pasta', c: 'Pasta'}, {e: 'Sandwich', c: 'Sandwich'}, {e: 'Fish', c: 'is-da'}, {e: 'Pizza', c: 'Pizza'}, {e: 'Meat', c: 'Karne'}, {e: 'Fruit', c: 'fruit-as'}, {e: 'Bread', c: 'Bun'}, {e: 'Yoghurt', c: 'Yoghurt'}, {e: 'Apple', c: 'man-sa-nas'}, {e: 'Bananas', c: 'sa-ging'}, {e: 'Carrots', c: 'karot'}, {e: 'Cheese', c: 'keso'}, {e: 'Potatoes', c: 'patatas'}, {e: 'Soup', c: 'sa-baw'}, {e: 'Vegetable', c: 'gula'}
                ]},
                {id: 'places', name: 'Places & Locations', icon: '🗺️', gradIdx: 6, words: [
                    {e: 'Office', c: 'opisina'}, {e: 'Cinema', c: 'sinehan'}, {e: 'Park', c: 'parke'}, {e: 'Beach', c: 'bay-bay-on'}, {e: 'Swimming pool', c: 'lun-ou-ya-nan'}, {e: 'Restaurant', c: 'kun-un-nan'}, {e: 'Play Ground', c: 'dula-anan'}, {e: 'Shop', c: 'tin-da-han'}, {e: 'Market', c: 'mer-kado'}, {e: 'Airport', c: 'tug-ba-ha-nan'}, {e: 'Forrest', c: 'ka-ka-hou-yan'}, {e: 'Jungle', c: 'ka-la-san-gan'}, {e: 'Desert', c: 'des-verto'}, {e: 'Ocean', c: 'da-gat'}, {e: 'City', c: 'siyudad'}
                ]},
                {id: 'animals', name: 'Animals & Insects', icon: '🦁', gradIdx: 7, words: [
                    {e: 'Chicken', c: 'ma-nok'}, {e: 'Cow', c: 'Ba-ka'}, {e: 'Horse', c: 'Ka-bayo'}, {e: 'Snake', c: 'bi-tin'}, {e: 'Bird', c: 'lang-gam'}, {e: 'Sheep', c: 'Kar-nero'}, {e: 'Goat', c: 'Kan-Ding'}, {e: 'Mosquito', c: 'La-mok'}, {e: 'Fly', c: 'Langaw'}, {e: 'Duck', c: 'Pato'}
                ]},
                {id: 'weather', name: 'Weather', icon: '⛅', gradIdx: 8, words: [
                    {e: 'Hot', c: 'in-it'}, {e: 'Cold', c: 'bug-naw'}, {e: 'Bright', c: 'hay-ag'}, {e: 'Dark', c: 'ngit-ngit'}
                ]},
                {id: 'question', name: 'Question Words', icon: '❓', gradIdx: 9, words: [
                    {e: 'Who?', c: 'kin-sa'}, {e: 'What', c: 'un-sa'}, {e: 'When?', c: 'kanus-a'}, {e: 'Where?', c: 'ar-sa'}, {e: 'Why?', c: 'ng-a-no'}, {e: 'How', c: 'unsa-on'}, {e: 'Maybe', c: 'Ba-sin'}
                ]},
                {id: 'colors', name: 'Colors', icon: '🎨', gradIdx: 10, words: [
                    {e: 'Red', c: 'Pula'}, {e: 'Blue', c: 'Asul'}, {e: 'Yellow', c: 'Dilaw'}, {e: 'Green', c: 'Berde'}, {e: 'Orange', c: 'Kahel'}, {e: 'Purple', c: 'Lila'}, {e: 'Pink', c: 'Puti-Pula'}, {e: 'Black', c: 'Itom'}, {e: 'White', c: 'Puti'}
                ]},
                {id: 'emotions', name: 'Emotions & States', icon: '😊', gradIdx: 11, words: [
                    {e: 'Happy', c: 'Masaya'}, {e: 'Sad', c: 'Lungag'}, {e: 'Angry', c: 'Galit'}, {e: 'Tired', c: 'Lubang'}, {e: 'Afraid', c: 'Takot'}, {e: 'Excited', c: 'Kugihan'}, {e: 'Sleepy', c: 'Antok'}
                ]}
            ]
        };

        const flipped = {};
        let activeSection = null;

        function toggleLanguageMode() {
            const toggle = document.getElementById('languageToggle');
            const toggleText = document.getElementById('toggleText');
            languageMode = toggle.checked ? 'ce' : 'en';
            toggleText.textContent = languageMode === 'en' ? 'ENGLISH → CEBUANO' : 'CEBUANO → ENGLISH';
            Object.keys(flipped).forEach(k => delete flipped[k]);
            render();
        }

        function buildNav() {
            const navMenu = document.getElementById('navMenu');
            navMenu.innerHTML = data.categories.map((cat, idx) => 
                `<button class="nav-btn" onclick="jumpToSection('${cat.id}', ${idx})">
                    <div class="nav-icon">${cat.icon}</div>
                    <div class="nav-label">${cat.name}</div>
                </button>`
            ).join('');
        }

        function jumpToSection(id, idx) {
            activeSection = id;
            updateNavActive(idx);
            const element = document.getElementById(`section-${id}`);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function updateNavActive(idx) {
            const navBtns = document.querySelectorAll('.nav-btn');
            navBtns.forEach((btn, i) => {
                btn.classList.toggle('active', i === idx);
            });
        }

        function toggle(id, idx) {
            const key = `${id}-${idx}`;
            flipped[key] = !flipped[key];
            render();
        }

        function resetSection(id) {
            const keysToRemove = Object.keys(flipped).filter(key => key.startsWith(id + '-'));
            keysToRemove.forEach(key => delete flipped[key]);
            render();
        }

        function returnToTop() {
            const header = document.getElementById('header');
            header.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function resetAll() {
            Object.keys(flipped).forEach(k => delete flipped[k]);
            render();
        }

        function render() {
            const html = data.categories.map(cat => `
                <div class="category-section" id="section-${cat.id}">
                    <div class="category-header">
                        <h2 class="category-title">${cat.name}</h2>
                        <div class="section-controls">
                            <button class="section-btn" onclick="resetSection('${cat.id}')" title="Reset this section">↻</button>
                            <button class="section-btn" onclick="returnToTop()" title="Return to top">↑</button>
                        </div>
                    </div>
                    <div class="words-grid">
                        ${cat.words.map((w, i) => {
                            const key = `${cat.id}-${i}`;
                            const isFlipped = flipped[key];
                            const gradClass = isFlipped ? gradients[cat.gradIdx] : '';
                            
                            let displayWord, revealWord;
                            if (languageMode === 'en') {
                                displayWord = isFlipped ? w.c : w.e;
                                revealWord = isFlipped ? w.e : w.c;
                            } else {
                                displayWord = isFlipped ? w.e : w.c;
                                revealWord = isFlipped ? w.c : w.e;
                            }
                            
                            return `<button class="word-card ${isFlipped ? 'flipped ' + gradClass : ''}" 
                                onclick="toggle('${cat.id}', ${i})">${displayWord}</button>`;
                        }).join('')}
                    </div>
                </div>
            `).join('');
            document.getElementById('categories').innerHTML = html;
        }

        buildNav();
        loadTheme();
        render();
    </script>
</body>
</html>
