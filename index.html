<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cebuano Vocabulary</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
            min-height: 100vh; 
            padding: 1.5rem; 
            color: #fff;
            transition: background 0.3s ease, color 0.3s ease;
        }
        
        body.light-theme {
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            color: #333;
        }
        .container { max-width: 700px; margin: 0 auto; }
        
        .header { 
            margin-bottom: 2rem; 
            text-align: center;
            scroll-margin-top: 100px;
        }
        .header h1 { 
            font-size: 2.5rem; 
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #FF6B9D 0%, #FFC75F 50%, #845EC2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p { 
            font-size: 0.95rem; 
            color: #aaa; 
            font-family: 'Inter', sans-serif;
        }
        
        /* Theme Toggle Button */
        .theme-toggle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
            margin-top: -0.8rem;
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.1);
        }

        body.light-theme .theme-toggle {
            background: rgba(0, 0, 0, 0.1);
            border-color: rgba(0, 0, 0, 0.2);
            color: #333;
        }

        body.light-theme .theme-toggle:hover {
            background: rgba(0, 0, 0, 0.2);
            border-color: rgba(0, 0, 0, 0.4);
        }

        /* Info Button */
        .info-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
            font-weight: 700;
            margin-top: 0.4rem;
        }

        .info-button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.1);
        }

        body.light-theme .info-button {
            background: rgba(0, 0, 0, 0.1);
            border-color: rgba(0, 0, 0, 0.2);
            color: #333;
        }

        body.light-theme .info-button:hover {
            background: rgba(0, 0, 0, 0.2);
            border-color: rgba(0, 0, 0, 0.4);
        }

        /* Header Container */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            transition: all 0.3s ease;
        }

        .header-container:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }

        body.light-theme .header-container {
            background: rgba(0, 0, 0, 0.05);
            border: 2px solid rgba(0, 0, 0, 0.1);
        }

        body.light-theme .header-container:hover {
            background: rgba(0, 0, 0, 0.08);
            border-color: rgba(0, 0, 0, 0.15);
        }

        /* Header Title with Flag */
        .header-title-section {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }

        .header-flag {
            width: 50px;
            height: 50px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .header-flag:hover {
            transform: scale(1.05);
        }

        body.light-theme .header-flag {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .header-title {
            line-height: 1.2;
        }

        .header-right {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            justify-content: flex-start;
            padding-top: 0.2rem;
        }

        .version-badge {
            font-size: 0.75rem;
            font-weight: 700;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        body.light-theme .version-badge {
            color: #666;
            background: rgba(0, 0, 0, 0.03);
            border-color: rgba(0, 0, 0, 0.1);
        }

        /* Light theme adjustments */
        body.light-theme .header p { 
            color: #555; 
        }

        body.light-theme .toggle-container {
            background: rgba(0, 0, 0, 0.05);
            border: 2px solid rgba(0, 0, 0, 0.1);
        }

        body.light-theme .toggle-label {
            color: #333;
        }

        body.light-theme .slider {
            background-color: rgba(0, 0, 0, 0.1);
            border: 2px solid rgba(0, 0, 0, 0.2);
        }

        body.light-theme .toggle-text {
            color: #333;
        }

        body.light-theme .nav-menu {
            background: rgba(0, 0, 0, 0.05);
            border: 2px solid rgba(0, 0, 0, 0.1);
        }

        body.light-theme .nav-btn {
            background: rgba(0, 0, 0, 0.08);
            color: #333;
            border: 2px solid rgba(0, 0, 0, 0.15);
        }

        body.light-theme .nav-btn:hover {
            background: rgba(0, 0, 0, 0.12);
            border-color: rgba(0, 0, 0, 0.3);
        }

        body.light-theme .nav-btn.active {
            background: linear-gradient(135deg, #FF6B9D 0%, #FF8066 100%);
            color: white;
        }

        body.light-theme .category-section { 
            background: rgba(0, 0, 0, 0.05);
            border: 2px solid rgba(0, 0, 0, 0.1);
        }

        body.light-theme .category-section:hover {
            background: rgba(0, 0, 0, 0.08);
            border-color: rgba(0, 0, 0, 0.15);
        }

        body.light-theme .category-title { 
            color: #333;
        }

        body.light-theme .word-card { 
            background: rgba(0, 0, 0, 0.05);
            border: 2px solid rgba(0, 0, 0, 0.1);
            color: #333;
        }

        body.light-theme .word-card:hover:not(.flipped) { 
            background: rgba(0, 0, 0, 0.08);
            border-color: rgba(0, 0, 0, 0.2);
        }

        body.light-theme .section-btn {
            background: rgba(0, 0, 0, 0.1);
            color: #333;
            border: 2px solid rgba(0, 0, 0, 0.2);
        }

        /* Global Counter Display */
        .global-counter-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
        }

        .global-counter-label {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #fff;
        }

        .global-counter-display {
            font-size: 1.5rem;
            font-weight: 700;
            color: #FF6B9D;
            min-width: 80px;
            text-align: center;
            background: rgba(255, 107, 157, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 2px solid rgba(255, 107, 157, 0.3);
            font-family: 'Poppins', sans-serif;
        }

        body.light-theme .global-counter-container {
            background: rgba(0, 0, 0, 0.05);
            border: 2px solid rgba(0, 0, 0, 0.1);
        }

        body.light-theme .global-counter-label {
            color: #333;
        }

        body.light-theme .global-counter-display {
            color: #FF6B9D;
            background: rgba(255, 107, 157, 0.05);
            border-color: rgba(255, 107, 157, 0.2);
        }

        /* Toggle Container */
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
        }

        .toggle-label {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 70px;
            height: 34px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.2);
            transition: 0.3s;
            border-radius: 34px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #FF6B9D;
            border-color: #FF8066;
        }

        input:checked + .slider:before {
            transform: translateX(36px);
        }

        .toggle-text {
            font-size: 0.85rem;
            font-weight: 600;
            min-width: 120px;
            text-align: center;
        }

        /* Navigation Grid */
        .nav-menu {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2.5rem;
            padding: 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }
        
        .nav-btn {
            padding: 1rem;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.75rem;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            min-height: 110px;
        }
        
        .nav-icon {
            font-size: 2rem;
            line-height: 1;
        }
        
        .nav-label {
            text-align: center;
            line-height: 1.2;
        }
        
        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-4px);
        }
        
        .nav-btn.active {
            background: linear-gradient(135deg, #FF6B9D 0%, #FF8066 100%);
            border-color: transparent;
            box-shadow: 0 6px 16px rgba(255, 107, 157, 0.3);
        }

        .controls {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
            gap: 1rem;
        }
        .reset-button { 
            padding: 0.8rem 2rem; 
            background: linear-gradient(135deg, #FF6B9D 0%, #FF8066 100%);
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 600;
            font-size: 0.95rem;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(255, 107, 157, 0.3);
        }
        .reset-button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(255, 107, 157, 0.4);
        }

        /* Category Section Boxes */
        .category-section { 
            margin-bottom: 2.5rem;
            padding: 1.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            transition: all 0.3s ease;
            scroll-margin-top: 100px;
        }
        
        .category-section:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            gap: 1rem;
        }

        .category-title-wrapper {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex: 1;
        }

        .category-title { 
            font-size: 1.3rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            color: #fff;
        }

        .word-counter {
            font-size: 1rem;
            font-weight: 600;
            color: #aaa;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            white-space: nowrap;
        }

        body.light-theme .word-counter {
            color: #555;
            background: rgba(0, 0, 0, 0.05);
            border-color: rgba(0, 0, 0, 0.1);
        }

        .section-controls {
            display: flex;
            gap: 0.6rem;
        }

        .section-btn {
            padding: 0.5rem 0.8rem;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.1rem;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 40px;
            height: 40px;
        }

        .section-btn:hover {
            background: linear-gradient(135deg, #FF6B9D 0%, #FF8066 100%);
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 107, 157, 0.3);
        }

        .words-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 1rem;
        }

        .word-card { 
            padding: 1.2rem 1rem; 
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; 
            cursor: pointer; 
            font-size: 0.95rem; 
            font-weight: 600;
            min-height: 110px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            color: #fff;
        }

        .word-card:hover:not(.flipped) { 
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .word-card.flipped { 
            color: white;
            border: none;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4);
            transform: scale(1.02);
        }
        
        /* Gradient backgrounds for flipped cards */
        .word-card.flipped.grad-1 { background: linear-gradient(135deg, #FF6B9D 0%, #FF8066 100%); }
        .word-card.flipped.grad-2 { background: linear-gradient(135deg, #FFC75F 0%, #FFD464 100%); }
        .word-card.flipped.grad-3 { background: linear-gradient(135deg, #845EC2 0%, #B39DDB 100%); }
        .word-card.flipped.grad-4 { background: linear-gradient(135deg, #00D2FC 0%, #3A86FF 100%); }
        .word-card.flipped.grad-5 { background: linear-gradient(135deg, #29FFC6 0%, #20C997 100%); }
        .word-card.flipped.grad-6 { background: linear-gradient(135deg, #FF9671 0%, #FFC75F 100%); }
        .word-card.flipped.grad-7 { background: linear-gradient(135deg, #F15BB5 0%, #FF6B9D 100%); }
        .word-card.flipped.grad-8 { background: linear-gradient(135deg, #00BCD4 0%, #4DD0E1 100%); }
        .word-card.flipped.grad-9 { background: linear-gradient(135deg, #7C3AED 0%, #A78BFA 100%); }
        .word-card.flipped.grad-10 { background: linear-gradient(135deg, #10B981 0%, #34D399 100%); }
        .word-card.flipped.grad-11 { background: linear-gradient(135deg, #EC4899 0%, #F472B6 100%); }
        .word-card.flipped.grad-12 { background: linear-gradient(135deg, #F59E0B 0%, #FBBF24 100%); }

        /* Footer Section */
        .footer-section { 
            margin-top: 3rem;
            padding: 1.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .footer-section:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .footer-text { 
            font-size: 0.9rem; 
            color: #aaa;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
        }

        body.light-theme .footer-section { 
            background: rgba(0, 0, 0, 0.05);
            border: 2px solid rgba(0, 0, 0, 0.1);
        }

        body.light-theme .footer-section:hover {
            background: rgba(0, 0, 0, 0.08);
            border-color: rgba(0, 0, 0, 0.15);
        }

        body.light-theme .footer-text { 
            color: #555;
        }

        /* Footer Content */
        .footer-content {
            display: flex;
            align-items: flex-start;
            gap: 1.5rem;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        body.light-theme .footer-content {
        }

        .footer-image {
            width: 80px;
            height: 80px;
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            object-fit: cover;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .footer-image:hover {
            transform: scale(1.05);
        }

        body.light-theme .footer-image {
            border-color: rgba(0, 0, 0, 0.1);
        }

        /* Footer Image Container */
        .footer-image-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
        }

        /* Return Button */
        .footer-return-button {
            padding: 0.5rem 1rem;
            background: rgba(255, 107, 157, 0.2);
            color: #FF6B9D;
            border: 2px solid rgba(255, 107, 157, 0.4);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .footer-return-button:hover {
            background: rgba(255, 107, 157, 0.3);
            border-color: rgba(255, 107, 157, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 157, 0.2);
        }

        body.light-theme .footer-return-button {
            background: rgba(255, 107, 157, 0.1);
            color: #FF6B9D;
            border-color: rgba(255, 107, 157, 0.3);
        }

        body.light-theme .footer-return-button:hover {
            background: rgba(255, 107, 157, 0.15);
            border-color: rgba(255, 107, 157, 0.5);
        }

        .footer-text {
            font-size: 0.95rem;
            color: #aaa;
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            text-align: left;
        }

        .footer-text strong {
            color: #FF6B9D;
            font-weight: 700;
        }

        body.light-theme .footer-text strong {
            color: #FF6B9D;
        }

        .footer-copyright {
            display: none;
        }

        /* Footer Version Badge */
        .footer-version {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            font-size: 0.75rem;
            font-weight: 700;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        body.light-theme .footer-version {
            color: #666;
            background: rgba(0, 0, 0, 0.03);
            border-color: rgba(0, 0, 0, 0.1);
        }

        @media (max-width: 600px) { 
            .header h1 { font-size: 2rem; }
            .header-flag { width: 45px; height: 45px; }
            .header-title-section { align-items: flex-start; gap: 0.8rem; }
            .header-title { font-size: 1.5rem; max-width: 180px; }
            .header-container { position: relative; flex-direction: column; align-items: flex-start; padding: 1.2rem; padding-right: 5.5rem; }
            .header-content { width: 100%; }
            .header-right { position: absolute; top: 1rem; right: 1rem; flex-direction: column; align-items: center; gap: 0.2rem; }
            .theme-toggle { margin-top: 0; width: 36px; height: 36px; font-size: 1.2rem; }
            .version-badge { font-size: 0.65rem; padding: 0.2rem 0.5rem; }
            .toggle-container { flex-direction: column; gap: 0.8rem; }
            .nav-menu { grid-template-columns: repeat(2, 1fr); gap: 0.8rem; padding: 0.8rem; }
            .nav-btn { padding: 0.8rem; min-height: 95px; font-size: 0.7rem; gap: 0.5rem; }
            .nav-icon { font-size: 1.5rem; }
            .category-section { padding: 1.2rem; }
            .category-header { flex-direction: column; align-items: flex-start; }
            .words-grid { gap: 0.75rem; }
            .word-card { 
                padding: 1rem 0.75rem; 
                font-size: 0.85rem; 
                min-height: 95px;
            }
            .reset-button { padding: 0.7rem 1.5rem; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="container">

        let languageMode = 'en'; // 'en' = English first, 'ce' = Cebuano first

        function toggleTheme() {
            isDarkTheme = !isDarkTheme;
            const body = document.body;
            const button = document.querySelector('.theme-toggle');
            
            if (isDarkTheme) {
                body.classList.remove('light-theme');
                button.textContent = '🌙';
                button.title = 'Switch to light theme';
            } else {
                body.classList.add('light-theme');
                button.textContent = '☀️';
                button.title = 'Switch to dark theme';
            }
            
            localStorage.setItem('theme', isDarkTheme ? 'dark' : 'light');
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            const button = document.querySelector('.theme-toggle');
            
            if (savedTheme === 'light') {
                isDarkTheme = false;
                document.body.classList.add('light-theme');
                button.textContent = '☀️';
                button.title = 'Switch to dark theme';
            } else {
                isDarkTheme = true;
                button.textContent = '🌙';
                button.title = 'Switch to light theme';

                ]},

                    {e: 'Sofa', c: 'Sopa'}, {e: 'Table', c: 'Lamisa'}, {e: 'Chair', c: 'Lingkuranan'}, {e: 'Television', c: 'Telebisyon'}, {e: 'Fan', c: 'Bentilador'}, {e: 'Light', c: 'Suga'}, {e: 'Curtains', c: 'Kurtina'}, {e: 'Cabinet', c: 'Kabinet'}, {e: 'Rug', c: 'Alpombra'}, {e: 'Picture Frame', c: 'Kwadro'}, {e: 'Flower Vase', c: 'Plorera'}, {e: 'Cushion', c: 'Unlan'}, {e: 'Wall Clock', c: 'Orasan sa bungbong'}, {e: 'Broom', c: 'Silhig'}, {e: 'Dustpan', c: 'Pandot'}, {e: 'Speaker', c: 'Spiker'}, {e: 'Center Table', c: 'Gamay nga lamisa'}, {e: 'Sofa Covers', c: 'Hapin sa sopa'}, {e: 'Door', c: 'Purtahan'}
                ]}

        const flipped = {};
        let activeSection = null;

        function toggleLanguageMode() {
            const toggle = document.getElementById('languageToggle');
            const toggleText = document.getElementById('toggleText');
            languageMode = toggle.checked ? 'ce' : 'en';
            toggleText.textContent = languageMode === 'en' ? 'ENGLISH → CEBUANO' : 'CEBUANO → ENGLISH';
            Object.keys(flipped).forEach(k => delete flipped[k]);
            render();
        }

        function buildNav() {
            const navMenu = document.getElementById('navMenu');
            navMenu.innerHTML = data.categories.map((cat, idx) => 
                `<button class="nav-btn" onclick="jumpToSection('${cat.id}', ${idx})">
                    <div class="nav-icon">${cat.icon}</div>
                    <div class="nav-label">${cat.name}</div>
                </button>`
            ).join('');
        }

        function jumpToSection(id, idx) {
            activeSection = id;
            updateNavActive(idx);
            const element = document.getElementById(`section-${id}`);
            const navBtn = document.querySelectorAll('.nav-btn')[idx];
            
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
            
            // Add temporary highlight to the button
            if (navBtn) {
                navBtn.style.transition = 'all 0.3s ease';
                navBtn.classList.add('active');
                
                // Remove the active class after 1 second
                setTimeout(() => {
                    navBtn.classList.remove('active');
                }, 1000);
            }
        }

        function updateNavActive(idx) {
            const navBtns = document.querySelectorAll('.nav-btn');
            navBtns.forEach((btn, i) => {
                btn.classList.toggle('active', i === idx);
            });
        }

        function toggle(id, idx) {
            const key = `${id}-${idx}`;
            if (flipped[key]) {
                // If already flipped, delete it to deselect
                delete flipped[key];
            } else {
                // If not flipped, set it to true
                flipped[key] = true;
            }
            render();
        }

        function resetSection(id) {
            const keysToRemove = Object.keys(flipped).filter(key => key.startsWith(id + '-'));
            keysToRemove.forEach(key => delete flipped[key]);
            render();
        }

        function returnToTop() {
            const header = document.getElementById('header');
            header.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function scrollToFooter() {
            const footer = document.querySelector('.footer-section');
            if (footer) {
                footer.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function resetAll() {
            Object.keys(flipped).forEach(k => delete flipped[k]);
            render();
        }

        function render() {
            const html = data.categories.map(cat => {
                // Count flipped cards for this category
                const flippedCount = Object.keys(flipped).filter(key => key.startsWith(cat.id + '-')).length;
                const totalWords = cat.words.length;
                
                return `
                <div class="category-section" id="section-${cat.id}">
                    <div class="category-header">
                        <div class="category-title-wrapper">
                            <h2 class="category-title">${cat.icon} ${cat.name}</h2>
                            <div class="word-counter">${flippedCount}/${totalWords}</div>
                        </div>
                        <div class="section-controls">
                            <button class="section-btn" onclick="resetSection('${cat.id}')" title="Reset this section">↻</button>
                            <button class="section-btn" onclick="returnToTop()" title="Return to top">↑</button>
                        </div>
                    </div>
                    <div class="words-grid">
                        ${cat.words.map((w, i) => {
                            const key = `${cat.id}-${i}`;
                            const isFlipped = flipped[key];
                            const gradClass = isFlipped ? gradients[cat.gradIdx] : '';
                            
                            let displayWord, revealWord;
                            if (languageMode === 'en') {
                                displayWord = isFlipped ? w.c : w.e;
                                revealWord = isFlipped ? w.e : w.c;
                            } else {
                                displayWord = isFlipped ? w.e : w.c;
                                revealWord = isFlipped ? w.c : w.e;
                            }
                            
                            return `<button class="word-card ${isFlipped ? 'flipped ' + gradClass : ''}\" 
                                onclick="toggle('${cat.id}', ${i})">${displayWord}</button>`;
                        }).join('')}
                    </div>
                </div>
            `; }).join('');
            document.getElementById('categories').innerHTML = html;
            
            // Update global counter
            const totalFlipped = Object.keys(flipped).length;
            document.getElementById('globalCounter').textContent = totalFlipped;
        }

        buildNav();
        loadTheme();
        render();
    </script>
