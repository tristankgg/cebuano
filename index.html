<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cebuano Vocabulary</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
            min-height: 100vh; 
            padding: 1.5rem; 
            color: #fff;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .header { 
            margin-bottom: 2.5rem; 
            text-align: center;
        }
        .header h1 { 
            font-size: 2.5rem; 
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #FF6B9D 0%, #FFC75F 50%, #845EC2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p { 
            font-size: 0.95rem; 
            color: #aaa; 
            font-family: 'Inter', sans-serif;
        }
        .controls {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
            gap: 1rem;
        }
        .reset-button { 
            padding: 0.8rem 2rem; 
            background: linear-gradient(135deg, #FF6B9D 0%, #FF8066 100%);
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 600;
            font-size: 0.95rem;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(255, 107, 157, 0.3);
        }
        .reset-button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(255, 107, 157, 0.4);
        }
        .category-section { margin-bottom: 2.5rem; }
        .category-title { 
            font-size: 1.1rem; 
            font-weight: 600; 
            margin-bottom: 1rem;
            text-transform: uppercase; 
            letter-spacing: 1px;
            color: #fff;
        }
        .words-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 1rem;
        }
        .word-card { 
            padding: 1.2rem 1rem; 
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; 
            cursor: pointer; 
            font-size: 0.95rem; 
            font-weight: 600;
            min-height: 110px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            color: #fff;
        }
        .word-card:hover:not(.flipped) { 
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        .word-card.flipped { 
            color: white;
            border: none;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4);
            transform: scale(1.02);
        }
        
        /* Gradient backgrounds for flipped cards */
        .word-card.flipped.grad-1 { background: linear-gradient(135deg, #FF6B9D 0%, #FF8066 100%); }
        .word-card.flipped.grad-2 { background: linear-gradient(135deg, #FFC75F 0%, #FFD464 100%); }
        .word-card.flipped.grad-3 { background: linear-gradient(135deg, #845EC2 0%, #B39DDB 100%); }
        .word-card.flipped.grad-4 { background: linear-gradient(135deg, #00D2FC 0%, #3A86FF 100%); }
        .word-card.flipped.grad-5 { background: linear-gradient(135deg, #29FFC6 0%, #20C997 100%); }
        .word-card.flipped.grad-6 { background: linear-gradient(135deg, #FF9671 0%, #FFC75F 100%); }
        .word-card.flipped.grad-7 { background: linear-gradient(135deg, #F15BB5 0%, #FF6B9D 100%); }
        .word-card.flipped.grad-8 { background: linear-gradient(135deg, #00BCD4 0%, #4DD0E1 100%); }
        .word-card.flipped.grad-9 { background: linear-gradient(135deg, #7C3AED 0%, #A78BFA 100%); }
        .word-card.flipped.grad-10 { background: linear-gradient(135deg, #10B981 0%, #34D399 100%); }
        .word-card.flipped.grad-11 { background: linear-gradient(135deg, #EC4899 0%, #F472B6 100%); }
        .word-card.flipped.grad-12 { background: linear-gradient(135deg, #F59E0B 0%, #FBBF24 100%); }

        @media (max-width: 600px) { 
            .header h1 { font-size: 2rem; }
            .words-grid { gap: 0.75rem; }
            .word-card { 
                padding: 1rem 0.75rem; 
                font-size: 0.85rem; 
                min-height: 95px;
            }
            .reset-button { padding: 0.7rem 1.5rem; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Cebuano Vocabulary</h1>
            <p>Learn essential Cebuano words</p>
        </div>

        <div class="controls">
            <button class="reset-button" onclick="resetAll()">↻ Reset All</button>
        </div>

        <div id="categories"></div>
    </div>

    <script>
        const gradients = ['grad-1', 'grad-2', 'grad-3', 'grad-4', 'grad-5', 'grad-6', 'grad-7', 'grad-8', 'grad-9', 'grad-10', 'grad-11', 'grad-12'];
        
        const data = {
            categories: [
                {id: 'greetings', name: 'Greetings & Manners', gradIdx: 0, words: [
                    {e: 'Hello', c: 'Kumusta'}, {e: 'How are you?', c: 'Kumusta ka'}, {e: 'Good Morning', c: 'Maayong Buntag'}, {e: 'Good Afternoon', c: 'Maayong Hapon'}, {e: 'Good Night', c: 'Maayong Gabii'}, {e: 'Thank you', c: 'salamat'}, {e: 'Please', c: 'palihog'}, {e: 'Yes', c: 'Oo'}, {e: 'No', c: 'Dili'}, {e: 'Yes Please', c: 'Oo Palihug'}, {e: 'No Thank You', c: 'Dili Salamat'}, {e: 'I want', c: 'Gusto Ko'}
                ]},
                {id: 'sentences', name: 'Feelings & Romance', gradIdx: 1, words: [
                    {e: 'I Love you', c: 'Gihigugma ko ikaw'}, {e: 'My Love', c: 'palangga ko'}, {e: 'Very Cute', c: 'Cute Kaayo'}, {e: 'Very Tasty', c: 'Lami Kaayo'}, {e: 'I want you to hug me', c: 'Gusto ko mo gakos nimo'}, {e: 'Handsome', c: 'Gwapo'}, {e: 'Beautiful', c: 'Gwapa'}
                ]},
                {id: 'numbers', name: 'Numbers', gradIdx: 2, words: [
                    {e: 'One', c: 'usa'}, {e: 'Two', c: 'duha'}, {e: 'Three', c: 'tulo'}, {e: 'Four', c: 'upat'}, {e: 'Five', c: 'lima'}, {e: 'Six', c: 'unom'}, {e: 'Seven', c: 'pito'}, {e: 'Eight', c: 'walo'}, {e: 'Nine', c: 'siyam'}, {e: 'Ten', c: 'napulo'}, {e: 'Eleven', c: 'napulo-og-usa'}
                ]},
                {id: 'days', name: 'Days of the Week', gradIdx: 3, words: [
                    {e: 'Monday', c: 'lunes'}, {e: 'Tuesday', c: 'martes'}, {e: 'Wednesday', c: 'miyerkules'}, {e: 'Thursday', c: 'huwebes'}, {e: 'Friday', c: 'biyernes'}, {e: 'Saturday', c: 'sabado'}, {e: 'Sunday', c: 'domingo'}
                ]},
                {id: 'months', name: 'Months', gradIdx: 4, words: [
                    {e: 'January', c: 'Enero'}, {e: 'February', c: 'Pebrero'}, {e: 'March', c: 'Marso'}, {e: 'April', c: 'Abril'}, {e: 'May', c: 'Mayo'}, {e: 'June', c: 'Hunyo'}, {e: 'July', c: 'Hulyo'}, {e: 'August', c: 'Agosto'}, {e: 'September', c: 'Septyembre'}, {e: 'October', c: 'Oktubre'}, {e: 'November', c: 'Nobyembre'}, {e: 'December', c: 'Disyembre'}
                ]},
                {id: 'food', name: 'Food & Drinks', gradIdx: 5, words: [
                    {e: 'Water', c: 'Tubig'}, {e: 'Pasta', c: 'Pasta'}, {e: 'Sandwich', c: 'Sandwich'}, {e: 'Fish', c: 'is-da'}, {e: 'Pizza', c: 'Pizza'}, {e: 'Meat', c: 'Karne'}, {e: 'Fruit', c: 'fruit-as'}, {e: 'Bread', c: 'Bun'}, {e: 'Yoghurt', c: 'Yoghurt'}, {e: 'Apple', c: 'man-sa-nas'}, {e: 'Bananas', c: 'sa-ging'}, {e: 'Carrots', c: 'karot'}, {e: 'Cheese', c: 'keso'}, {e: 'Potatoes', c: 'patatas'}, {e: 'Soup', c: 'sa-baw'}, {e: 'Vegetable', c: 'gula'}
                ]},
                {id: 'places', name: 'Places & Locations', gradIdx: 6, words: [
                    {e: 'Office', c: 'opisina'}, {e: 'Cinema', c: 'sinehan'}, {e: 'Park', c: 'parke'}, {e: 'Beach', c: 'bay-bay-on'}, {e: 'Swimming pool', c: 'lun-ou-ya-nan'}, {e: 'Restaurant', c: 'kun-un-nan'}, {e: 'Play Ground', c: 'dula-anan'}, {e: 'Shop', c: 'tin-da-han'}, {e: 'Market', c: 'mer-kado'}, {e: 'Airport', c: 'tug-ba-ha-nan'}, {e: 'Forrest', c: 'ka-ka-hou-yan'}, {e: 'Jungle', c: 'ka-la-san-gan'}, {e: 'Desert', c: 'des-verto'}, {e: 'Ocean', c: 'da-gat'}, {e: 'City', c: 'siyudad'}
                ]},
                {id: 'animals', name: 'Animals & Insects', gradIdx: 7, words: [
                    {e: 'Chicken', c: 'ma-nok'}, {e: 'Cow', c: 'Ba-ka'}, {e: 'Horse', c: 'Ka-bayo'}, {e: 'Snake', c: 'bi-tin'}, {e: 'Bird', c: 'lang-gam'}, {e: 'Sheep', c: 'Kar-nero'}, {e: 'Goat', c: 'Kan-Ding'}, {e: 'Mosquito', c: 'La-mok'}, {e: 'Fly', c: 'Langaw'}, {e: 'Duck', c: 'Pato'}
                ]},
                {id: 'weather', name: 'Weather', gradIdx: 8, words: [
                    {e: 'Hot', c: 'in-it'}, {e: 'Cold', c: 'bug-naw'}, {e: 'Bright', c: 'hay-ag'}, {e: 'Dark', c: 'ngit-ngit'}
                ]},
                {id: 'question', name: 'Question Words', gradIdx: 9, words: [
                    {e: 'Who?', c: 'kin-sa'}, {e: 'What', c: 'un-sa'}, {e: 'When?', c: 'kanus-a'}, {e: 'Where?', c: 'ar-sa'}, {e: 'Why?', c: 'ng-a-no'}, {e: 'How', c: 'unsa-on'}, {e: 'Maybe', c: 'Ba-sin'}
                ]},
                {id: 'colors', name: 'Colors', gradIdx: 10, words: [
                    {e: 'Red', c: 'Pula'}, {e: 'Blue', c: 'Asul'}, {e: 'Yellow', c: 'Dilaw'}, {e: 'Green', c: 'Berde'}, {e: 'Orange', c: 'Kahel'}, {e: 'Purple', c: 'Lila'}, {e: 'Pink', c: 'Puti-Pula'}, {e: 'Black', c: 'Itom'}, {e: 'White', c: 'Puti'}
                ]},
                {id: 'emotions', name: 'Emotions & States', gradIdx: 11, words: [
                    {e: 'Happy', c: 'Masaya'}, {e: 'Sad', c: 'Lungag'}, {e: 'Angry', c: 'Galit'}, {e: 'Tired', c: 'Lubang'}, {e: 'Afraid', c: 'Takot'}, {e: 'Excited', c: 'Kugihan'}, {e: 'Sleepy', c: 'Antok'}
                ]}
            ]
        };

        const flipped = {};

        function toggle(id, idx) {
            const key = `${id}-${idx}`;
            flipped[key] = !flipped[key];
            render();
        }

        function resetAll() {
            Object.keys(flipped).forEach(k => delete flipped[k]);
            render();
        }

        function render() {
            const html = data.categories.map(cat => `
                <div class="category-section">
                    <h2 class="category-title">${cat.name}</h2>
                    <div class="words-grid">
                        ${cat.words.map((w, i) => {
                            const key = `${cat.id}-${i}`;
                            const isFlipped = flipped[key];
                            const gradClass = isFlipped ? gradients[cat.gradIdx] : '';
                            return `<button class="word-card ${isFlipped ? 'flipped ' + gradClass : ''}" 
                                onclick="toggle('${cat.id}', ${i})">${isFlipped ? w.c : w.e}</button>`;
                        }).join('')}
                    </div>
                </div>
            `).join('');
            document.getElementById('categories').innerHTML = html;
        }

        render();
    </script>
</body>
</html>
